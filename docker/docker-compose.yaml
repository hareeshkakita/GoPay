services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: gopay-app
    env_file:
      - ../.env
    environment:
      PORT: 8060
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/gopay?sslmode=disable
    ports:
      - "8060:8060"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: gopay-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gopay}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5436:5432"
    volumes:
      - gopay_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gopay"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  gopay_pgdata: