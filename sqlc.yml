version: "2"
sql:
  - engine: "postgresql"
    schema: "internal/db/sqlc/schema.sql"
    queries: "internal/db/sqlc/queries.sql"
    gen:
      go:
        package: "dbsqlc"
        out: "internal/db/sqlc/gen"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false